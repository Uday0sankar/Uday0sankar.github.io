<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joke Generator</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    .joke { font-size: 24px; margin: 20px auto; padding: 20px; max-width: 600px; }
    .getJoke { padding: 10px 20px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <!-- <h1>Joke Generator</h1> -->
  <p>Click the button </p>
  <div id="content" style="color:blue;" class="joke">Loading a joke...</div>
  <button class="getJoke">reset</button>
  <input id="area" class="joke" style="color:red;" oninput="startTyping()" >

</input>


  <script>
    const jokeButton = document.querySelector('.getJoke');
    const jokeHolder = document.querySelector('.joke');

    async function fetchJoke() {
      const response = await fetch('https://icanhazdadjoke.com/', {
        headers: { 'Accept': 'application/json' }
      });
      const data = await response.json();
      return data.joke;
    }

    async function handleClick() {
      const joke = await fetchJoke(); 
      jokeHolder.textContent = joke;
    }

    function startTyping() {
      console.log("content to type ", jokeHolder.textContent);
     
      let content=document.getElementById('content').textContent;
      console.log('text content:', content, 'type of content:', typeof content);

      console.log('User started typing');
      let Tchar=document.getElementById('area').value;
      console.log('Length of text:', Tchar.length);
       
      console.log('Current text:', Tchar); 
      console.log('last character:', Tchar.slice(-1));
      lchar=Tchar.slice(-1)
      console.log('index of last character:', Tchar.indexOf(Tchar.slice(-1)));
      let index = Tchar.indexOf(Tchar.slice(-1));
      console.log('Index of last character:', index ,"index of ", typeof index);
      let correspondingChar = content.charAt(index);
      console.log('Corresponding character from content:', correspondingChar);
      
      let lastChar = Tchar.charAt(Tchar.length - 1);
      console.log('Last character lastChar :', lastChar); 
      console.log('lastChar', lastChar, 'correspondingChar:', correspondingChar);   
      if   (lastChar === correspondingChar) {
        console.log('Correct character typed');
      } else {
        console.log('Incorrect character typed');
      } 
                    
  }

    jokeButton.addEventListener('click', handleClick);

    // Load an initial joke
    handleClick();
  </script>
</body>
</html>

    <script>
        const textDisplay = document.getElementById('text-display');
        const inputField = document.getElementById('input-field');
        const timerDisplay = document.getElementById('timer');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const highScoreDisplay = document.getElementById('high-score');

        const sampleTexts = [
            "the quick brown fox jumps over the lazy dog",
            "a journey of a thousand miles begins with a single step",
            "to be or not to be that is the question",
            "all that glitters is not gold",
            "the early bird catches the worm"
        ];

        let currentText = '';

        let timer = null;
        let isTestRunning = false;
        let charIndex = 0;

            if (!isTestRunning) {

                currentText = sampleTexts[Math.floor(Math.random() * sampleTexts.length)];

                charIndex = 0;
                correctChars = 0;
                totalCharsTyped = 0;

        function renderText() {
            textDisplay.innerHTML = '';

                    span.classList.add(inputField.value[index] === char ? 'correct' : 'incorrect');

                    span.classList.add('current');
                }
                textDisplay.appendChild(span);
            });
